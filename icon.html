<!DOCTYPE html>
<html><head><meta charset="utf-8"><style>
  html,body{margin:0;padding:0;width:1024px;height:1024px;background:transparent;}
  .wrap{width:1024px;height:1024px;display:flex;align-items:center;justify-content:center;}
</style></head>
<body>
<div class="wrap">
<svg width="1024" height="1024" viewBox="0 0 1024 1024" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#6f8cff"/>
      <stop offset="1" stop-color="#7b5cff"/>
    </linearGradient>
    <filter id="sh" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="14" stdDeviation="22" flood-color="#000" flood-opacity="0.28"/>
    </filter>
  </defs>

  <!-- squircle background -->
  <rect x="112" y="112" width="800" height="800" rx="200" ry="200" fill="url(#bg)" filter="url(#sh)"/>

  <!-- donut ring: four category-colored arcs around a dark hole -->
  <g transform="translate(512,512)">
    <circle r="232" fill="none" stroke="#1a1730" stroke-width="118" opacity="0.45"/>
    <!-- arcs via stroke-dasharray on a circle of circumference 2*pi*232 ≈ 1458 -->
    <g fill="none" stroke-width="104" stroke-linecap="butt" transform="rotate(-90)">
      <circle r="232" stroke="#34c79a" stroke-dasharray="510 948"/>
      <circle r="232" stroke="#4f9dff" stroke-dasharray="365 1093" stroke-dashoffset="-510"/>
      <circle r="232" stroke="#a98bff" stroke-dasharray="290 1168" stroke-dashoffset="-875"/>
      <circle r="232" stroke="#ffb454" stroke-dasharray="293 1165" stroke-dashoffset="-1165"/>
    </g>
    <!-- clock hands in the hole -->
    <circle r="150" fill="#15122a"/>
    <line x1="0" y1="0" x2="0" y2="-96" stroke="#fff" stroke-width="26" stroke-linecap="round"/>
    <line x1="0" y1="0" x2="70" y2="34" stroke="#fff" stroke-width="26" stroke-linecap="round"/>
    <circle r="20" fill="#fff"/>
  </g>
</svg>
</div>
</body></html>
